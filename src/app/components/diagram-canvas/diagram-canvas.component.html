<div class="canvas-container">
  <!-- Diagram Title Header -->
  <div class="diagram-header">
    <input
      class="diagram-title"
      [value]="getCurrentDiagramTitle()"
      (blur)="onDiagramTitleChange($event)"
      (keydown.enter)="onDiagramTitleEnterKey($event)"
      placeholder="Diagram Name">
    <button *ngIf="canGoBack()" (click)="goBack()" class="back-btn" title="Go Back to Parent Diagram">⬆️</button>
    <button *ngIf="canGoBack()" (click)="deleteCurrentDiagram()" class="delete-diagram-btn" title="Delete This Nested Diagram">🗑️</button>
  </div>

  <svg #canvas class="diagram-canvas" width="100%" height="100%"
    [attr.viewBox]="svgViewBox"
    [style.cursor]="isPanning ? 'grabbing' : 'crosshair'"
    (click)="onCanvasClick($event)"
    (mousedown)="onCanvasMouseDown($event)"
    (mousemove)="onCanvasMouseMove($event)"
    (mouseup)="onCanvasMouseUp($event)"
    (mouseleave)="onCanvasMouseUp($event)">

    <!-- Grid background -->
    <rect class="canvas-bg" width="100%" height="100%" fill="url(#grid)">
    </rect>

    <!-- Bounding boxes - bottom layer -->
    <g class="bounding-boxes">
      <g *ngFor="let box of state.currentDiagram.boundingBoxes" class="bounding-box-group" cdkDrag
        [attr.transform]="getGroupMemberTransform(box)"
        (cdkDragStarted)="onElementDragStarted(box)" (cdkDragMoved)="onElementDragMoved($event)"
        (cdkDragEnded)="onElementDragEnd($event, box)" (click)="onBoundingBoxClick($event, box)"
        (contextmenu)="onBoundingBoxContextMenu($event, box)">

        <!-- Bounding box rectangle -->
        <rect [attr.x]="box.position.x" [attr.y]="box.position.y" [attr.width]="box.size.width"
          [attr.height]="box.size.height" [attr.rx]="box.rounded ? '10' : '0'" [attr.ry]="box.rounded ? '10' : '0'"
          [attr.fill]="box.fillColor" [attr.stroke]="box.borderColor" [attr.stroke-width]="box.strokeWidth || 1" stroke-dasharray="8,4"
          [class.selected]="isSelected('boundingBox', box.id)"
          [class.highlighted]="isHighlighted('box', box.id)"
          class="bounding-box">
        </rect>

        <!-- Resize handle -->
        <g *ngIf="isSelected('boundingBox', box.id)">
          <!-- Invisible larger hit area -->
          <circle [attr.cx]="box.position.x + box.size.width"
            [attr.cy]="box.position.y + box.size.height" r="15" fill="transparent"
            (mousedown)="startBoundingBoxResize($event, box, 'se')" style="cursor: nw-resize;">
          </circle>
          <!-- Visible handle -->
          <circle [attr.cx]="box.position.x + box.size.width"
            [attr.cy]="box.position.y + box.size.height" r="4" class="resize-handle"
            pointer-events="none">
          </circle>
        </g>

        <!-- Bounding box label -->
        <text [attr.x]="box.position.x + box.size.width - 10" [attr.y]="box.position.y + 20" text-anchor="end"
          dominant-baseline="hanging" class="bounding-box-label"
          [style.font-family]="box.fontFamily"
          [style.font-size.px]="box.fontSize"
          [style.font-weight]="box.fontWeight"
          [style.font-style]="box.fontStyle">
          {{ box.label }}
        </text>
      </g>
    </g>

    <!-- Groups -->
    <g class="groups">
      <ng-container *ngFor="let group of getGroups()">
        <rect *ngIf="isGroupSelected(group) && getGroupBoundingBox(group) as bbox"
          [attr.x]="bbox.x"
          [attr.y]="bbox.y"
          [attr.width]="bbox.width"
          [attr.height]="bbox.height"
          class="group-rect">
        </rect>
      </ng-container>
    </g>

    <!-- Elements (Nodes and SVG Images) -->
    <g class="elements">
      <g *ngFor="let element of state.currentDiagram.elements" class="element-group" cdkDrag
        [style.transform]="getGroupMemberTransform(element)"
        [cdkDragDisabled]="isSelected('node', element.id) || isSelected('svg', element.id)"
        (cdkDragStarted)="onElementDragStarted(element)"
        (cdkDragMoved)="onElementDragMoved($event)"
        (cdkDragEnded)="onElementDragEnd($event, element)" (click)="onElementClick($event, element)"
        (dblclick)="onElementDoubleClick(element)" (contextmenu)="onElementContextMenu($event, element)">

        <!-- SVG Image content -->
        <ng-container *ngIf="isSvgImage(element)">
          <defs>
            <filter [id]="'svgOutline-' + element.id" x="-20%" y="-20%" width="140%" height="140%">
              <!-- Thicken the alpha channel -->
              <feMorphology in="SourceAlpha" result="DILATED" operator="dilate" [attr.radius]="($any(element).strokeWidth || 1) / 2" />
              <!-- Color the thickened alpha channel -->
              <feFlood [attr.flood-color]="$any(element).borderColor || 'black'" flood-opacity="1" result="OUTLINE_COLOR" />
              <feComposite in="OUTLINE_COLOR" in2="DILATED" operator="in" result="OUTLINE" />
              <!-- Add a subtle drop shadow to the outline -->
              <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.3" result="SHADOW" />
              <!-- Place shadow, then outline, then original image -->
              <feMerge>
                <feMergeNode in="SHADOW" />
                <feMergeNode in="OUTLINE" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <g [attr.transform]="getNodeTransform(element)">
            <!-- SVG layered backdrops: offset copies of the actual SVG content -->
            <g *ngIf="$any(element).layered"
              [innerHTML]="sanitizeSvgContent($any(element).svgContent)"
              [attr.transform]="'translate(' + (element.position.x + 24) + ',' + (element.position.y + 24) + ')'"
              [attr.filter]="'url(#svgOutline-' + element.id + ')'" class="node-layer">
            </g>
            <g *ngIf="$any(element).layered"
              [innerHTML]="sanitizeSvgContent($any(element).svgContent)"
              [attr.transform]="'translate(' + (element.position.x + 12) + ',' + (element.position.y + 12) + ')'"
              [attr.filter]="'url(#svgOutline-' + element.id + ')'" class="node-layer">
            </g>
            <!-- SVG content -->
            <g [innerHTML]="sanitizeSvgContent($any(element).svgContent)"
              [attr.transform]="'translate(' + element.position.x + ',' + element.position.y + ')'"
              [attr.filter]="$any(element).layered ? 'url(#svgOutline-' + element.id + ')' : null">
            </g>
          </g>

          <!-- Bounding box for SVG (invisible but for selection) -->
          <rect [attr.x]="element.position.x" [attr.y]="element.position.y" [attr.width]="element.size.width"
            [attr.height]="element.size.height" fill="transparent" stroke="transparent" class="svg-image-bounds">
          </rect>

          <!-- Resize handle -->
          <g *ngIf="isSelected('svg', element.id)">
            <!-- Invisible larger hit area -->
            <circle [attr.cx]="element.position.x + element.size.width"
              [attr.cy]="element.position.y + element.size.height" r="15" fill="transparent"
              (mousedown)="startSvgImageResize($event, $any(element), 'se')" style="cursor: nw-resize;">
            </circle>
            <!-- Visible handle -->
            <circle [attr.cx]="element.position.x + element.size.width"
              [attr.cy]="element.position.y + element.size.height" r="4" class="resize-handle"
              pointer-events="none">
            </circle>
          </g>

          <!-- SVG Image Label -->
          <text *ngIf="$any(element).label" [attr.x]="element.position.x + element.size.width / 2"
            [attr.y]="element.position.y + element.size.height + 20" text-anchor="middle" dominant-baseline="hanging"
            class="svg-image-label">
            {{ $any(element).label }}
          </text>

          <!-- Gear icon (hover to open properties) -->
          <g class="element-gear-btn"
            [attr.transform]="'translate(' + (element.position.x + element.size.width - 10) + ',' + (element.position.y - 10) + ')'"
            (click)="onGearClick($event, element)">
            <circle r="9" fill="#fff" stroke="#aaa" stroke-width="1" opacity="0.92"/>
            <text font-size="11" text-anchor="middle" dominant-baseline="central" fill="#555" style="pointer-events:none">⚙</text>
          </g>
        </ng-container>

        <!-- Node shapes -->
        <ng-container *ngIf="isNode(element)">
          <g [attr.transform]="getNodeTransform(element)">

            <!-- Layered Rectangle -->
            <rect *ngIf="$any(element).shape === 'rectangle' && $any(element).layered" [attr.x]="$any(element).position.x + 8"
              [attr.y]="$any(element).position.y + 8" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="$any(element).rounded ? 10 : null" [attr.ry]="$any(element).rounded ? 10 : null"
            [attr.fill]="$any(element).fillColor"
            [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </rect>
          <rect *ngIf="$any(element).shape === 'rectangle' && $any(element).layered" [attr.x]="$any(element).position.x + 4"
            [attr.y]="$any(element).position.y + 4" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="$any(element).rounded ? 10 : null" [attr.ry]="$any(element).rounded ? 10 : null"
            [attr.fill]="$any(element).fillColor"
            [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </rect>

          <!-- Main Rectangle -->
          <rect *ngIf="$any(element).shape === 'rectangle'" [attr.x]="$any(element).position.x"
            [attr.y]="$any(element).position.y" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="$any(element).rounded ? 10 : null" [attr.ry]="$any(element).rounded ? 10 : null"
            [attr.fill]="$any(element).fillColor"
            [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" [attr.filter]="!$any(element).layered ? 'url(#dropshadow)' : null"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </rect>

          <!-- Layered Circle -->
          <circle *ngIf="$any(element).shape === 'circle' && $any(element).layered"
            [attr.cx]="$any(element).position.x + $any(element).size.width / 2 + 8"
            [attr.cy]="$any(element).position.y + $any(element).size.height / 2 + 8" [attr.r]="getCircleRadius(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </circle>
          <circle *ngIf="$any(element).shape === 'circle' && $any(element).layered"
            [attr.cx]="$any(element).position.x + $any(element).size.width / 2 + 4"
            [attr.cy]="$any(element).position.y + $any(element).size.height / 2 + 4" [attr.r]="getCircleRadius(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </circle>

          <!-- Main Circle -->
          <circle *ngIf="$any(element).shape === 'circle'"
            [attr.cx]="$any(element).position.x + $any(element).size.width / 2"
            [attr.cy]="$any(element).position.y + $any(element).size.height / 2" [attr.r]="getCircleRadius(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" [attr.filter]="!$any(element).layered ? 'url(#dropshadow)' : null"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </circle>

          <!-- Numbered circle shape -->
          <g *ngIf="$any(element).shape === 'numberedCircle'" [class.highlighted]="isHighlighted('node', element.id)"
            class="numbered-circle" filter="url(#dropshadow)">
            <circle [attr.cx]="$any(element).position.x + $any(element).size.width / 2"
              [attr.cy]="$any(element).position.y + $any(element).size.height / 2" [attr.r]="getCircleRadius(element)"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" class="node">
            </circle>
            <!-- Number text inside circle -->
            <text [attr.x]="$any(element).position.x + $any(element).size.width / 2"
              [attr.y]="$any(element).position.y + $any(element).size.height / 2" text-anchor="middle"
              dominant-baseline="middle" [style.fill]="$any(element).innerDiagram ? '#00008B' : '#000000'"
              font-size="16" [style.fontWeight]="$any(element).innerDiagram ? 'bold' : 'bold'"
              class="numbered-circle-text">
              {{ $any(element).label || '1' }}
            </text>
          </g>

          <!-- Layered Pill -->
          <rect *ngIf="$any(element).shape === 'pill' && $any(element).layered" [attr.x]="$any(element).position.x + 8"
            [attr.y]="$any(element).position.y + 8" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="$any(element).size.height / 2"
            [attr.ry]="$any(element).size.height / 2" [attr.fill]="$any(element).fillColor"
            [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </rect>
          <rect *ngIf="$any(element).shape === 'pill' && $any(element).layered" [attr.x]="$any(element).position.x + 4"
            [attr.y]="$any(element).position.y + 4" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="$any(element).size.height / 2"
            [attr.ry]="$any(element).size.height / 2" [attr.fill]="$any(element).fillColor"
            [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </rect>

          <!-- Main Pill -->
          <rect *ngIf="$any(element).shape === 'pill'" [attr.x]="$any(element).position.x"
            [attr.y]="$any(element).position.y" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="$any(element).size.height / 2"
            [attr.ry]="$any(element).size.height / 2" [attr.fill]="$any(element).fillColor"
            [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" [attr.filter]="!$any(element).layered ? 'url(#dropshadow)' : null"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </rect>
          <!-- Generic layered backdrops for: cylinder, browser, mobile -->
          <ng-container *ngIf="$any(element).layered">
            <rect *ngIf="['cylinder','browser','mobile'].includes($any(element).shape)"
              [attr.x]="$any(element).position.x + 8" [attr.y]="$any(element).position.y + 8"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height"
              [attr.rx]="$any(element).shape === 'mobile' ? 12 : 4"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
              [attr.stroke-width]="$any(element).strokeWidth || 1"
              filter="url(#dropshadow)" class="node-layer">
            </rect>
            <rect *ngIf="['cylinder','browser','mobile'].includes($any(element).shape)"
              [attr.x]="$any(element).position.x + 4" [attr.y]="$any(element).position.y + 4"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height"
              [attr.rx]="$any(element).shape === 'mobile' ? 12 : 4"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
              [attr.stroke-width]="$any(element).strokeWidth || 1"
              filter="url(#dropshadow)" class="node-layer">
            </rect>
          </ng-container>

          <g *ngIf="$any(element).shape === 'cylinder'" [class.highlighted]="isHighlighted('node', element.id)"
            class="cylinder" [attr.filter]="!$any(element).layered ? 'url(#dropshadow)' : null">
            <!-- Main cylinder body with bottom curve -->
            <path [attr.d]="getCylinderPath(element)" [attr.fill]="$any(element).fillColor"
              [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null">
            </path>
            <!-- Top ellipse -->
            <ellipse [attr.cx]="$any(element).position.x + $any(element).size.width / 2"
              [attr.cy]="$any(element).position.y + getCylinderRy(element)" [attr.rx]="$any(element).size.width / 2"
              [attr.ry]="getCylinderRy(element)" [attr.fill]="$any(element).fillColor"
              [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null">
            </ellipse>
          </g>

          <!-- Diamond shape for decision -->
          <polygon *ngIf="$any(element).shape === 'diamond'" [attr.points]="getDiamondPoints(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </polygon>

          <!-- Parallelogram shape for input/output -->
          <polygon *ngIf="$any(element).shape === 'parallelogram'" [attr.points]="getParallelogramPoints(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </polygon>

          <!-- Document shape -->
          <g *ngIf="$any(element).shape === 'document'" [class.highlighted]="isHighlighted('node', element.id)"
            class="document" filter="url(#dropshadow)">
            <!-- Document rectangle -->
            <rect [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height - 15"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="$any(element).strokeWidth || 1"
              [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null">
            </rect>
            <!-- Document wavy bottom -->
            <path [attr.d]="getDocumentBottomPath(element)" [attr.fill]="$any(element).fillColor"
              [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="$any(element).strokeWidth || 1"
              [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null">
            </path>
          </g>

          <!-- Layered Rounded Rectangle -->
          <rect *ngIf="$any(element).shape === 'roundedRectangle' && $any(element).layered" [attr.x]="$any(element).position.x + 8"
            [attr.y]="$any(element).position.y + 8" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="10" [attr.ry]="10"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </rect>
          <rect *ngIf="$any(element).shape === 'roundedRectangle' && $any(element).layered" [attr.x]="$any(element).position.x + 4"
            [attr.y]="$any(element).position.y + 4" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="10" [attr.ry]="10"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="$any(element).strokeWidth || 1"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            class="node-layer">
          </rect>

          <!-- Main Rounded Rectangle -->
          <rect *ngIf="$any(element).shape === 'roundedRectangle'" [attr.x]="$any(element).position.x"
            [attr.y]="$any(element).position.y" [attr.width]="$any(element).size.width"
            [attr.height]="$any(element).size.height" [attr.rx]="10" [attr.ry]="10"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" [attr.filter]="!$any(element).layered ? 'url(#dropshadow)' : null"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </rect>

          <!-- Hexagon shape for preparation -->
          <polygon *ngIf="$any(element).shape === 'hexagon'" [attr.points]="getHexagonPoints(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </polygon>

          <!-- Triangle shape for manual operation -->
          <polygon *ngIf="$any(element).shape === 'triangle'" [attr.points]="getTrianglePoints(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </polygon>

          <!-- Trapezoid shape for manual input -->
          <polygon *ngIf="$any(element).shape === 'trapezoid'" [attr.points]="getTrapezoidPoints(element)"
            [attr.fill]="$any(element).fillColor" [attr.stroke]="$any(element).borderColor"
            [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
            [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null" filter="url(#dropshadow)"
            [class.highlighted]="isHighlighted('node', element.id)" class="node">
          </polygon>

          <!-- Text-only node (no shape, just text) -->
          <g *ngIf="$any(element).shape === 'text'" [class.highlighted]="isHighlighted('node', element.id)"
            class="text-node">

          <!-- Cross shape -->

                                     ($any(element).position.x + $any(element).size.width / 2 + 3) + ',' + ($any(element).position.y + $any(element).size.height / 2 - getInterfaceRadius(element) * 0.38)"
              [attr.fill]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor">
            </polygon>

            <!-- Outward Arrow: Bottom -->
            <line [attr.x1]="$any(element).position.x + $any(element).size.width / 2"
              [attr.y1]="$any(element).position.y + $any(element).size.height / 2 + getInterfaceRadius(element) * 0.25"
              [attr.x2]="$any(element).position.x + $any(element).size.width / 2"
              [attr.y2]="$any(element).position.y + $any(element).size.height / 2 + getInterfaceRadius(element) * 0.45"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="2" stroke-linecap="round">
            </line>
            <polygon [attr.points]="($any(element).position.x + $any(element).size.width / 2) + ',' + ($any(element).position.y + $any(element).size.height / 2 + getInterfaceRadius(element) * 0.45) + ' ' +
                                     ($any(element).position.x + $any(element).size.width / 2 - 3) + ',' + ($any(element).position.y + $any(element).size.height / 2 + getInterfaceRadius(element) * 0.38) + ' ' +
                                     ($any(element).position.x + $any(element).size.width / 2 + 3) + ',' + ($any(element).position.y + $any(element).size.height / 2 + getInterfaceRadius(element) * 0.38)"
              [attr.fill]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor">
            </polygon>

            <!-- Outward Arrow: Left -->
            <line [attr.x1]="$any(element).position.x + $any(element).size.width / 2 - getInterfaceRadius(element) * 0.25"
              [attr.y1]="$any(element).position.y + $any(element).size.height / 2"
              [attr.x2]="$any(element).position.x + $any(element).size.width / 2 - getInterfaceRadius(element) * 0.45"
              [attr.y2]="$any(element).position.y + $any(element).size.height / 2"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="2" stroke-linecap="round">
            </line>
            <polygon [attr.points]="($any(element).position.x + $any(element).size.width / 2 - getInterfaceRadius(element) * 0.45) + ',' + ($any(element).position.y + $any(element).size.height / 2) + ' ' +
                                     ($any(element).position.x + $any(element).size.width / 2 - getInterfaceRadius(element) * 0.38) + ',' + ($any(element).position.y + $any(element).size.height / 2 - 3) + ' ' +
                                     ($any(element).position.x + $any(element).size.width / 2 - getInterfaceRadius(element) * 0.38) + ',' + ($any(element).position.y + $any(element).size.height / 2 + 3)"
              [attr.fill]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor">
            </polygon>

            <!-- Outward Arrow: Right -->
            <line [attr.x1]="$any(element).position.x + $any(element).size.width / 2 + getInterfaceRadius(element) * 0.25"
              [attr.y1]="$any(element).position.y + $any(element).size.height / 2"
              [attr.x2]="$any(element).position.x + $any(element).size.width / 2 + getInterfaceRadius(element) * 0.45"
              [attr.y2]="$any(element).position.y + $any(element).size.height / 2"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="2" stroke-linecap="round">
            </line>
            <polygon [attr.points]="($any(element).position.x + $any(element).size.width / 2 + getInterfaceRadius(element) * 0.45) + ',' + ($any(element).position.y + $any(element).size.height / 2) + ' ' +
                                     ($any(element).position.x + $any(element).size.width / 2 + getInterfaceRadius(element) * 0.38) + ',' + ($any(element).position.y + $any(element).size.height / 2 - 3) + ' ' +
                                     ($any(element).position.x + $any(element).size.width / 2 + getInterfaceRadius(element) * 0.38) + ',' + ($any(element).position.y + $any(element).size.height / 2 + 3)"
              [attr.fill]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor">
            </polygon>
          </g>

          <!-- Hard Drive shape -->
          <g *ngIf="$any(element).shape === 'hardDrive'" [class.highlighted]="isHighlighted('node', element.id)" class="hard-drive" filter="url(#dropshadow)">
            <!-- Outer Frame / Platters -->
            <rect [attr.x]="$any(element).position.x + 4" [attr.y]="$any(element).position.y + $any(element).size.height * 0.1"
              [attr.width]="$any(element).size.width - 8" [attr.height]="$any(element).size.height * 0.2" rx="2"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? 2 : 1">
            </rect>
            <rect [attr.x]="$any(element).position.x + 4" [attr.y]="$any(element).position.y + $any(element).size.height * 0.4"
              [attr.width]="$any(element).size.width - 8" [attr.height]="$any(element).size.height * 0.2" rx="2"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? 2 : 1">
            </rect>
            <rect [attr.x]="$any(element).position.x + 4" [attr.y]="$any(element).position.y + $any(element).size.height * 0.7"
              [attr.width]="$any(element).size.width - 8" [attr.height]="$any(element).size.height * 0.2" rx="2"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? 2 : 1">
            </rect>
            <!-- R/W Head Arm -->
            <path [attr.d]="'M' + ($any(element).position.x + $any(element).size.width - 8) + ',' + ($any(element).position.y + $any(element).size.height * 0.8) + ' ' +
                            'L' + ($any(element).position.x + $any(element).size.width - 16) + ',' + ($any(element).position.y + $any(element).size.height * 0.5) + ' ' +
                            'L' + ($any(element).position.x + $any(element).size.width - 24) + ',' + ($any(element).position.y + $any(element).size.height * 0.5)"
              fill="none" [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="1.5">
            </path>
          </g>

          <!-- Terminal shape -->
          <g *ngIf="$any(element).shape === 'terminal'" [class.highlighted]="isHighlighted('node', element.id)" class="terminal" filter="url(#dropshadow)">
            <rect [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height" rx="4"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null">
            </rect>
            <line [attr.x1]="$any(element).position.x" [attr.y1]="$any(element).position.y + 16"
              [attr.x2]="$any(element).position.x + $any(element).size.width" [attr.y2]="$any(element).position.y + 16"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="1">
            </line>
            <!-- Code Console prompt characters -->
            <text [attr.x]="$any(element).position.x + 8" [attr.y]="$any(element).position.y + 32"
              font-family="monospace" font-size="12" font-weight="bold"
              [attr.fill]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor">>_</text>
          </g>

          <!-- Bell shape -->
          <g *ngIf="$any(element).shape === 'bell'" [class.highlighted]="isHighlighted('node', element.id)" class="bell" filter="url(#dropshadow)">
            <!-- Handle loop -->
            <circle [attr.cx]="$any(element).position.x + $any(element).size.width / 2"
              [attr.cy]="$any(element).position.y + $any(element).size.height * 0.15"
              [attr.r]="$any(element).size.width * 0.08" fill="none"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)">
            </circle>
            <!-- Main bell -->
            <path [attr.d]="getBellPath(element)"
              [attr.fill]="$any(element).fillColor" [attr.stroke]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              [attr.stroke-dasharray]="$any(element).dotted ? '5,5' : null">
            </path>
            <!-- Bell clapper -->
            <circle [attr.cx]="$any(element).position.x + $any(element).size.width / 2"
              [attr.cy]="$any(element).position.y + $any(element).size.height * 0.88"
              [attr.r]="$any(element).size.width * 0.08"
              [attr.fill]="isSelected('node', element.id) ? '#007bff' : $any(element).borderColor"
              stroke="none">
            </circle>
          </g>

          <!-- Note shape (page with curled corner and pushpin) -->
          <g *ngIf="$any(element).shape === 'note'" [class.highlighted]="isHighlighted('node', element.id)" class="note">
            <!-- Custom shadow for the note -->
            <path [attr.d]="getNoteShadowPath(element)" fill="rgba(0,0,0,0.2)" filter="blur(4px)" [attr.transform]="'translate(4, 4)'"></path>

            <!-- Main note body -->
            <path [attr.d]="getNoteMainPath(element)"
              [attr.fill]="isSelected('node', element.id) ? '#fff176' : ($any(element).fillColor || 'url(#noteGradient)')"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : '#e0e0e0'"
              [attr.stroke-width]="isSelected('node', element.id) ? 2 : 0.5">
            </path>

          </g>

          <!-- Vertical Line shape -->
          <g *ngIf="$any(element).shape === 'verticalLine'" [class.highlighted]="isHighlighted('node', element.id)"
            class="node">
            <!-- Invisible background for selection -->
            <rect [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height" fill="transparent"
              stroke="transparent">
            </rect>
            <!-- The line itself -->
            <line [attr.x1]="$any(element).position.x + $any(element).size.width / 2"
              [attr.y1]="$any(element).position.y" [attr.x2]="$any(element).position.x + $any(element).size.width / 2"
              [attr.y2]="$any(element).position.y + $any(element).size.height" [attr.stroke]="$any(element).borderColor"
              [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)" [attr.stroke-dasharray]="$any(element).dotted ? '12,8' : null">
            </line>
          </g>

          <!-- Horizontal Line shape -->
          <g *ngIf="$any(element).shape === 'horizontalLine'" [class.highlighted]="isHighlighted('node', element.id)"
            class="node">
            <!-- Invisible background for selection -->
            <rect [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height" fill="transparent"
              stroke="transparent">
            </rect>
            <!-- The line itself -->
            <line [attr.x1]="$any(element).position.x"
              [attr.y1]="$any(element).position.y + $any(element).size.height / 2"
              [attr.x2]="$any(element).position.x + $any(element).size.width"
              [attr.y2]="$any(element).position.y + $any(element).size.height / 2"
              [attr.stroke]="$any(element).borderColor" [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              [attr.stroke-dasharray]="$any(element).dotted ? '12,8' : null">
            </line>
          </g>

          <!-- CRC Card shape -->
          <g *ngIf="$any(element).shape === 'crcCard'" [class.highlighted]="isHighlighted('node', element.id)"
            class="crc-card" [attr.filter]="!$any(element).layered ? 'url(#dropshadow)' : null">

            <!-- Main card background (for selection/hit area) -->
            <rect [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height"
              [attr.fill]="$any(element).fillColor || '#ffffff'"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : ($any(element).borderColor || '#000000')"
              [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              class="node">
            </rect>

            <!-- HTML content via foreignObject -->
            <foreignObject [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height">
              <div xmlns="http://www.w3.org/1999/xhtml" class="crc-card-content"
                [style.width.px]="$any(element).size.width"
                [style.height.px]="$any(element).size.height">

                <!-- Header -->
                <div class="crc-header">{{ getCrcCardData(element)?.className || 'Class Name' }}</div>

                <!-- Super Classes -->
                <div class="crc-section crc-super">
                  <div class="crc-section-label">Super Classes:</div>
                  <div class="crc-section-content">{{ getCrcCardData(element)?.superClasses?.join(', ') || '' }}</div>
                </div>

                <!-- Sub Classes -->
                <div class="crc-section crc-sub">
                  <div class="crc-section-label">Sub Classes:</div>
                  <div class="crc-section-content">{{ getCrcCardData(element)?.subClasses?.join(', ') || '' }}</div>
                </div>

                <!-- Description -->
                <div class="crc-description">
                  <span class="crc-bold">Description:</span> {{ getCrcCardData(element)?.description || '' }}
                </div>

                <!-- Attributes -->
                <div class="crc-table-section">
                  <div class="crc-table-header">Attributes:</div>
                  <table class="crc-table">
                    <thead><tr><th>Name</th><th>Description</th></tr></thead>
                    <tbody>
                      <tr *ngFor="let attr of getCrcCardData(element)?.attributes || []">
                        <td>{{ attr.name }}</td><td>{{ attr.description }}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                <!-- Responsibilities -->
                <div class="crc-table-section">
                  <div class="crc-table-header">Responsibilities:</div>
                  <table class="crc-table">
                    <thead><tr><th>Name</th><th>Collaborator</th></tr></thead>
                    <tbody>
                      <tr *ngFor="let resp of getCrcCardData(element)?.responsibilities || []">
                        <td>{{ resp.name }}</td><td>{{ resp.collaborator }}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </foreignObject>

            <!-- Gear icon -->
            <g class="element-gear-btn"
              [attr.transform]="'translate(' + ($any(element).position.x + $any(element).size.width - 10) + ',' + ($any(element).position.y - 10) + ')'"
              (click)="onGearClick($event, element)">
              <circle r="9" fill="#fff" stroke="#aaa" stroke-width="1" opacity="0.92"/>
              <text font-size="11" text-anchor="middle" dominant-baseline="central" fill="#555" style="pointer-events:none">⚙</text>
            </g>
          </g>

          <!-- Threat Table shape -->
          <g *ngIf="$any(element).shape === 'threatTable'" [class.highlighted]="isHighlighted('node', element.id)"
            class="threat-table" [attr.filter]="!$any(element).layered ? 'url(#dropshadow)' : null">

            <!-- Main background (for selection/hit area) -->
            <rect [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height"
              [attr.fill]="'#ffffff'"
              [attr.stroke]="isSelected('node', element.id) ? '#007bff' : ($any(element).borderColor || '#000000')"
              [attr.stroke-width]="isSelected('node', element.id) ? (3 + ($any(element).strokeWidth || 1)) : ($any(element).strokeWidth || 1)"
              class="node">
            </rect>

            <!-- HTML content via foreignObject -->
            <foreignObject [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
              [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height">
              <div xmlns="http://www.w3.org/1999/xhtml" class="threat-table-content"
                [style.width.px]="$any(element).size.width"
                [style.height.px]="$any(element).size.height"
                [style.border-color]="$any(element).borderColor || '#000000'">

                <!-- Header Bar -->
                <div class="threat-table-header" [style.background-color]="$any(element).fillColor || '#f0f0f0'" [style.border-bottom]="!getThreatTableData(element)?.collapsed ? '1px solid ' + ($any(element).borderColor || '#000000') : 'none'">
                  <!-- Collapse Button -->
                  <button class="threat-table-toggle" (click)="toggleTableCollapse($event, element)" [style.border-color]="$any(element).borderColor || '#000000'">
                    {{ getThreatTableData(element)?.collapsed ? '+' : '–' }}
                  </button>
                  <span class="threat-table-title">{{ getThreatTableData(element)?.title || 'Threat Table' }}</span>
                </div>

                <!-- Table Body -->
                <div class="threat-table-body" *ngIf="!getThreatTableData(element)?.collapsed">
                  <table class="threat-table-grid" [style.border-color]="$any(element).borderColor || '#000000'">
                    <thead>
                      <tr [style.background-color]="($any(element).fillColor) ? ($any(element).fillColor + '33') : '#f8f9fa'">
                        <th [style.border-color]="$any(element).borderColor || '#000000'" [style.border-right-color]="$any(element).borderColor || '#000000'">{{ getThreatTableData(element)?.col1Header || 'ID' }}</th>
                        <th [style.border-color]="$any(element).borderColor || '#000000'">{{ getThreatTableData(element)?.col2Header || 'Description' }}</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr *ngFor="let row of getThreatTableData(element)?.rows || []">
                        <td class="col-id" [style.border-color]="$any(element).borderColor || '#000000'" [style.border-right-color]="$any(element).borderColor || '#000000'">{{ row.col1 }}</td>
                        <td class="col-desc" [style.border-color]="$any(element).borderColor || '#000000'">{{ row.col2 }}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </foreignObject>
          </g>

          <!-- Resize handles -->
          <g *ngIf="isSelected('node', element.id)">
            <!-- Invisible larger hit area -->
            <circle [attr.cx]="$any(element).position.x + $any(element).size.width"
              [attr.cy]="$any(element).position.y + $any(element).size.height" r="15" fill="transparent"
              (mousedown)="startResize($event, $any(element), 'se')" style="cursor: nw-resize;">
            </circle>
            <!-- Visible handle -->
            <circle [attr.cx]="$any(element).position.x + $any(element).size.width"
              [attr.cy]="$any(element).position.y + $any(element).size.height" r="4" class="resize-handle"
              pointer-events="none">
            </circle>
          </g>

          <!-- Gear icon (hover to open properties) -->
          <g class="element-gear-btn"
            [attr.transform]="'translate(' + ($any(element).position.x + $any(element).size.width - 10) + ',' + ($any(element).position.y - 10) + ')'"
            (click)="onGearClick($event, element)">
            <circle r="9" fill="#fff" stroke="#aaa" stroke-width="1" opacity="0.92"/>
            <text font-size="11" text-anchor="middle" dominant-baseline="central" fill="#555" style="pointer-events:none">⚙</text>
          </g>



          <!-- Pushpin for Note Shape (Rendered last to be on top) -->
          <g *ngIf="$any(element).shape === 'note'" class="pushpin" [attr.transform]="'translate(' + ($any(element).position.x + $any(element).size.width / 2) + ',' + ($any(element).position.y + 10) + ')'" style="pointer-events: none;">
            <!-- Pin shadow -->
            <ellipse cx="2" cy="15" rx="5" ry="2" fill="rgba(0,0,0,0.3)" filter="blur(2px)"></ellipse>
            <!-- Pin needle -->
            <line x1="0" y1="5" x2="-2" y2="18" stroke="#999" stroke-width="2" stroke-linecap="round"></line>
            <!-- Pin base -->
            <ellipse cx="0" cy="5" rx="8" ry="4" fill="#d32f2f"></ellipse>
            <!-- Pin body -->
            <rect x="-6" y="-5" width="12" height="10" rx="2" fill="url(#pushpinGradient)"></rect>
            <!-- Pin head -->
            <circle cx="0" cy="-6" r="7" fill="url(#pushpinGradient)"></circle>
            <!-- Pin highlight -->
            <circle cx="-2" cy="-8" r="1.5" fill="rgba(255,255,255,0.6)"></circle>
          </g>
        </g>
      </ng-container>

          <!-- Node name/text - outside the rotated group so it stays upright -->
          <ng-container *ngIf="isNode(element)">
            <!-- Rectangle with stereotypes: combined stereotype + label in one text block -->
            <text *ngIf="($any(element).shape === 'rectangle' || $any(element).shape === 'roundedRectangle') && getStereotypes(element).length > 0"
              [attr.x]="getNodeTextXRotated(element)"
              [attr.y]="getNodeTextYRotated(element)"
              text-anchor="middle"
              dominant-baseline="middle"
              [style.font-family]="$any(element).fontFamily"
              [style.fill]="$any(element).innerDiagram ? '#00008B' : '#000000'"
              class="node-name">
              <tspan *ngFor="let stereo of getStereotypes(element); let i = index"
                [attr.x]="getNodeTextXRotated(element)"
                [attr.dy]="i === 0 ? -(getStereotypes(element).length * 14 + 4) : 14"
                font-style="italic"
                [style.font-size.px]="($any(element).fontSize || 14) - 4">
                «{{ stereo }}»
              </tspan>
              <tspan [attr.x]="getNodeTextXRotated(element)" dy="18"
                [style.font-size.px]="$any(element).fontSize"
                font-style="normal">
                {{ $any(element).label }}
              </tspan>
            </text>

            <!-- Standard label text -->
            <text *ngIf="!(($any(element).shape === 'rectangle' || $any(element).shape === 'roundedRectangle') && getStereotypes(element).length > 0) && $any(element).shape !== 'note' && $any(element).shape !== 'text' && $any(element).shape !== 'numberedCircle'"
              [attr.x]="getNodeTextXRotated(element)" [attr.y]="getNodeTextYRotated(element)"
              [attr.text-anchor]="getNodeTextAnchor(element)" [attr.dominant-baseline]="getNodeTextBaseline(element)"
              [style.font-family]="$any(element).fontFamily"
              [style.font-size.px]="$any(element).fontSize"
              [style.font-weight]="$any(element).fontWeight"
              [style.font-style]="$any(element).fontStyle"
              [style.fill]="$any(element).innerDiagram ? '#00008B' : '#000000'"
              class="node-name">
              {{ $any(element).label }}
            </text>

            <!-- Note & Text shapes: show label inside as a text area (also outside rotated group) -->
            <ng-container *ngIf="$any(element).shape === 'note' || $any(element).shape === 'text'">
              <foreignObject [attr.x]="$any(element).position.x" [attr.y]="$any(element).position.y"
                [attr.width]="$any(element).size.width" [attr.height]="$any(element).size.height"
                pointer-events="none">
                <div xmlns="http://www.w3.org/1999/xhtml"
                  [style.width.px]="$any(element).size.width"
                  [style.height.px]="$any(element).size.height"
                  [style.font-family]="$any(element).fontFamily"
                  [style.font-size.px]="$any(element).fontSize"
                  [style.font-weight]="$any(element).fontWeight"
                  [style.font-style]="$any(element).fontStyle"
                  style="display: flex; align-items: flex-start; justify-content: flex-start; text-align: left; padding: 15px; box-sizing: border-box; word-break: break-word; overflow: hidden; line-height: 1.4; color: #333;"
                  [style.padding-top.px]="$any(element).shape === 'note' ? 35 : 15">
                  {{ $any(element).label }}
                </div>
              </foreignObject>
            </ng-container>
          </ng-container>

        <!-- Nested diagram indicator icon -->
        <g *ngIf="isNode(element) && $any(element).innerDiagram" class="nested-diagram-indicator">
          <rect [attr.x]="$any(element).position.x + 4"
                [attr.y]="$any(element).position.y + $any(element).size.height - 16"
                width="12" height="12"
                fill="#00008B" rx="2"/>
          <path [attr.d]="'M' + ($any(element).position.x + 7) + ',' + ($any(element).position.y + $any(element).size.height - 12) + ' ' + ($any(element).position.x + 10) + ',' + ($any(element).position.y + $any(element).size.height - 6) + ' ' + ($any(element).position.x + 13) + ',' + ($any(element).position.y + $any(element).size.height - 12)"
                fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- Tendrils for all elements -->
        <g class="tendrils">
          <ng-container *ngFor="let tendril of element.tendrils">
            <!-- Invisible larger click area -->
            <rect
              [attr.x]="tendril.type === 'incoming' ? $any(element).position.x + tendril.position.x - 30 : $any(element).position.x + tendril.position.x - 10"
              [attr.y]="$any(element).position.y + tendril.position.y - 15"
              [attr.width]="tendril.type === 'incoming' ? 45 : 45" [attr.height]="30" fill="transparent"
              (mousedown)="onElementTendrilClick($event, element, tendril)"
              (contextmenu)="onElementTendrilContextMenu($event, element, tendril)" class="tendril-click-area">
            </rect>

            <!-- Tendril circles -->
            <circle [attr.cx]="$any(element).position.x + tendril.position.x"
              [attr.cy]="$any(element).position.y + tendril.position.y" [attr.r]="isSelected('tendril', tendril.id) ? 8 : 5"
              [attr.fill]="getTendrilColor(tendril, false)" [attr.stroke]="isSelected('tendril', tendril.id) ? '#007bff' : '#ffffff'"
              [attr.stroke-width]="isSelected('tendril', tendril.id) ? '3' : '1'" class="tendril"
              cdkDrag [cdkDragDisabled]="!isCtrlEdgeMode" (cdkDragStarted)="onTendrilDragStarted($event, element, tendril)"
              (cdkDragMoved)="onTendrilDragMoved($event, element, tendril)"
              (cdkDragEnded)="onTendrilDragEnded($event, element, tendril)"
              (mousedown)="onElementTendrilClick($event, element, tendril)"
              (contextmenu)="onElementTendrilContextMenu($event, element, tendril)" style="cursor: pointer; pointer-events: all;">
              <title>{{ getTendrilTooltip(element.id, tendril.id) }}</title>
            </circle>

            <!-- Tendril name - only hide when there's an edge name -->
            <text *ngIf="!hasEdgeName(element.id, tendril.id)"
              [attr.x]="tendril.position.x < $any(element).size.width / 2 ? $any(element).position.x + tendril.position.x - 25 : $any(element).position.x + tendril.position.x + 25"
              [attr.y]="$any(element).position.y + tendril.position.y - 8"
              [attr.text-anchor]="tendril.position.x < $any(element).size.width / 2 ? 'end' : 'start'"
              dominant-baseline="middle" class="tendril-name" (click)="onElementTendrilClick($event, element, tendril)"
              (contextmenu)="onElementTendrilContextMenu($event, element, tendril)" style="cursor: pointer;">
              {{ tendril.name }}
            </text>
          </ng-container>

          <!-- Propagated tendrils from inner diagram (only for nodes) -->
          <ng-container *ngIf="isNode(element)">
            <ng-container *ngFor="let tendril of getPropagatedTendrils($any(element)); let i = index">
              <!-- Position propagated tendrils around the node perimeter -->
              <ng-container *ngIf="getPropagatedTendrilPosition($any(element), i) as pos">
                <!-- Invisible larger click area -->
                <rect [attr.x]="tendril.type === 'incoming' ? pos.x - 30 : pos.x - 10" [attr.y]="pos.y - 15"
                  [attr.width]="tendril.type === 'incoming' ? 45 : 45" [attr.height]="30" fill="transparent"
                  (mousedown)="onPropagatedTendrilClick($event, $any(element), tendril)"
                  (contextmenu)="onPropagatedTendrilContextMenu($event, $any(element), tendril)"
                  class="tendril-click-area">
                </rect>

                <!-- Tendril circles -->
                <circle [attr.cx]="pos.x" [attr.cy]="pos.y" [attr.r]="isSelected('tendril', tendril.id) ? 8 : 5" [attr.fill]="getTendrilColor(tendril, true)"
                  [attr.stroke]="isSelected('tendril', tendril.id) ? '#007bff' : '#ffffff'" [attr.stroke-width]="isSelected('tendril', tendril.id) ? '3' : '1'" class="propagated-tendril"
                  (mousedown)="onPropagatedTendrilClick($event, $any(element), tendril)"
                  (contextmenu)="onPropagatedTendrilContextMenu($event, $any(element), tendril)"
                  style="cursor: pointer; pointer-events: all;">
                  <title>{{ getPropagatedTendrilTooltip(element.id, tendril.id) }}</title>
                </circle>

                <!-- Tendril name - only hide when there's an edge name -->
                <text *ngIf="!hasPropagatedEdgeName(element.id, tendril.id)"
                  [attr.x]="pos.x < $any(element).position.x + $any(element).size.width / 2 ? pos.x - 25 : pos.x + 25"
                  [attr.y]="pos.y - 8"
                  [attr.text-anchor]="pos.x < $any(element).position.x + $any(element).size.width / 2 ? 'end' : 'start'"
                  dominant-baseline="middle" class="propagated-tendril-name"
                  (click)="onPropagatedTendrilClick($event, $any(element), tendril)"
                  (contextmenu)="onPropagatedTendrilContextMenu($event, $any(element), tendril)"
                  style="cursor: pointer;">
                  {{ tendril.name }}
                </text>
              </ng-container>
            </ng-container>
          </ng-container>
        </g>
      </g>
    </g>

    <!-- Edges -->
    <g class="edges">
      <g *ngFor="let edge of getCurrentEdges()" class="edge-group">
        <!-- If it's a curved edge (has control points), render single continuous path and name -->
        <ng-container *ngIf="(edge.attributes?.['controlPoints'] || []).length > 0 || !edge.name">
          <!-- Hit area for easier selection -->
          <path [attr.d]="getEdgePath(edge)" class="edge-hit-area" fill="none" stroke="transparent" stroke-width="20"
            (click)="onEdgeClick($event, edge)" (contextmenu)="onEdgeContextMenu($event, edge)"
            (dblclick)="onEdgePathDoubleClick($event, edge)">
          </path>
          <path [attr.d]="getEdgePath(edge)" class="edge"
            [class.selected]="isSelected('edge', edge.id)" [attr.stroke]="edge.borderColor || '#666'"
            [attr.stroke-width]="isSelected('edge', edge.id) ? (3 + (edge.strokeWidth || 1)) : (edge.strokeWidth || 1)"
            [attr.stroke-dasharray]="edge.dotted ? '5,5' : null" fill="none" marker-end="url(#arrowhead-v2)"
            (click)="onEdgeClick($event, edge)" (contextmenu)="onEdgeContextMenu($event, edge)">
          </path>
        </ng-container>
        <!-- For straight labeled edges, keep the two path segments with a gap -->
        <ng-container *ngIf="edge.name && !(edge.attributes?.['controlPoints'] || []).length && getEdgePathSegments(edge) as segments">
          <!-- Hit area for easier selection -->
          <path [attr.d]="segments.first + forceUpdate" class="edge-hit-area" fill="none" stroke="transparent" stroke-width="20"
            (click)="onEdgeClick($event, edge)" (contextmenu)="onEdgeContextMenu($event, edge)"
            (dblclick)="onEdgePathDoubleClick($event, edge)">
          </path>
          <path [attr.d]="segments.second + forceUpdate" class="edge-hit-area" fill="none" stroke="transparent" stroke-width="20"
            (click)="onEdgeClick($event, edge)" (contextmenu)="onEdgeContextMenu($event, edge)"
            (dblclick)="onEdgePathDoubleClick($event, edge)">
          </path>

          <path [attr.d]="segments.first + forceUpdate" class="edge" [class.selected]="isSelected('edge', edge.id)"
            [attr.stroke]="edge.borderColor || '#666'" [attr.stroke-width]="isSelected('edge', edge.id) ? (3 + (edge.strokeWidth || 1)) : (edge.strokeWidth || 1)"
            [attr.stroke-dasharray]="edge.dotted ? '5,5' : null" fill="none"
            (click)="onEdgeClick($event, edge)" (contextmenu)="onEdgeContextMenu($event, edge)">
          </path>
          <path [attr.d]="segments.second + forceUpdate" class="edge" [class.selected]="isSelected('edge', edge.id)"
            [attr.stroke]="edge.borderColor || '#666'" [attr.stroke-width]="isSelected('edge', edge.id) ? (3 + (edge.strokeWidth || 1)) : (edge.strokeWidth || 1)"
            [attr.stroke-dasharray]="edge.dotted ? '5,5' : null" fill="none"
            marker-end="url(#arrowhead-v2)" (click)="onEdgeClick($event, edge)" (contextmenu)="onEdgeContextMenu($event, edge)">
          </path>
        </ng-container>
        <!-- Edge name label -->
        <text *ngIf="edge.name" [attr.x]="getEdgeLabelPosition(edge).x" [attr.y]="getEdgeLabelPosition(edge).y"
          [style.font-family]="edge.fontFamily"
          [style.font-size.px]="edge.fontSize"
          [style.font-weight]="edge.fontWeight"
          [style.font-style]="edge.fontStyle"
          text-anchor="middle" dominant-baseline="middle" class="edge-name"
          (click)="onEdgeClick($event, edge)" (contextmenu)="onEdgeContextMenu($event, edge)">
          {{ edge.name }}
        </text>
      </g>
    </g>

    <!-- Connectors -->
    <g class="connectors">
      <g *ngFor="let connector of getCurrentConnectors()" class="connector-group">
        <!-- Hit area -->
        <path [attr.d]="getConnectorPath(connector)" class="connector-hit-area" fill="none" stroke="transparent" stroke-width="20"
          (click)="onConnectorClick($event, connector)" (contextmenu)="onConnectorContextMenu($event, connector)"
          (dblclick)="onConnectorPathDoubleClick($event, connector)">
        </path>
        <!-- Line -->
        <path [attr.d]="getConnectorPath(connector)" class="connector"
          [class.selected]="isSelected('connector', connector.id)"
          [attr.stroke]="connector.borderColor || '#666'"
          [attr.stroke-width]="isSelected('connector', connector.id) ? (3 + (connector.strokeWidth || 2)) : (connector.strokeWidth || 2)"
          [attr.stroke-dasharray]="connector.dotted ? '5,5' : null"
          [attr.marker-start]="connector.startArrow ? 'url(#arrow-start)' : null"
          [attr.marker-end]="connector.endArrow ? 'url(#arrow-end)' : null"
          fill="none"
          (click)="onConnectorClick($event, connector)" (contextmenu)="onConnectorContextMenu($event, connector)">
        </path>
        <!-- Label -->
        <text *ngIf="connector.name" [attr.x]="getConnectorLabelPosition(connector).x" [attr.y]="getConnectorLabelPosition(connector).y - 12"
          text-anchor="middle" dominant-baseline="middle" class="connector-name"
          (click)="onConnectorClick($event, connector)" (contextmenu)="onConnectorContextMenu($event, connector)">
          {{ connector.name }}
        </text>
      </g>
    </g>

    <!-- Temporary edge during creation -->
    <path *ngIf="isCreatingEdge" [attr.d]="getTempEdgePath()" class="temp-edge" stroke="#999" stroke-width="2"
      stroke-dasharray="5,5" fill="none">
    </path>

    <!-- Control Point Handles (visible when edge/connector is selected) -->
    <g class="control-point-handles" style="pointer-events: all;">
      <!-- Selected Edge handles -->
      <ng-container *ngFor="let edge of getCurrentEdges()">
        <ng-container *ngIf="isSelected('edge', edge.id)">
          <!-- Real Control Point Handles -->
          <circle *ngFor="let cp of (edge.attributes?.['controlPoints'] || []); let i = index"
            [attr.cx]="cp.x" [attr.cy]="cp.y" r="6" fill="#007bff" stroke="#ffffff" stroke-width="1.5"
            style="cursor: move;" (mousedown)="startDragControlPoint($event, edge.id, i, 'edge')"
            (dblclick)="deleteControlPoint($event, edge.id, i, 'edge')" title="Double click to delete control point">
          </circle>
          <!-- Ghost Mid-segment Handles -->
          <circle *ngFor="let ghost of getEdgeGhostPoints(edge); let i = index"
            [attr.cx]="ghost.x" [attr.cy]="ghost.y" r="4.5" fill="#007bff" opacity="0.5" stroke="#ffffff" stroke-width="1"
            style="cursor: pointer;" (mousedown)="startDragGhostControlPoint($event, edge.id, i, ghost, 'edge')" title="Drag to add curve bend">
          </circle>
        </ng-container>
      </ng-container>

      <!-- Selected Connector handles -->
      <ng-container *ngFor="let connector of getCurrentConnectors()">
        <ng-container *ngIf="isSelected('connector', connector.id)">
          <!-- Real Control Point Handles -->
          <circle *ngFor="let cp of (connector.attributes?.['controlPoints'] || []); let i = index"
            [attr.cx]="cp.x" [attr.cy]="cp.y" r="6" fill="#007bff" stroke="#ffffff" stroke-width="1.5"
            style="cursor: move;" (mousedown)="startDragControlPoint($event, connector.id, i, 'connector')"
            (dblclick)="deleteControlPoint($event, connector.id, i, 'connector')" title="Double click to delete control point">
          </circle>
          <!-- Ghost Mid-segment Handles -->
          <circle *ngFor="let ghost of getConnectorGhostPoints(connector); let i = index"
            [attr.cx]="ghost.x" [attr.cy]="ghost.y" r="4.5" fill="#007bff" opacity="0.5" stroke="#ffffff" stroke-width="1"
            style="cursor: pointer;" (mousedown)="startDragGhostControlPoint($event, connector.id, i, ghost, 'connector')" title="Drag to add curve bend">
          </circle>
        </ng-container>
      </ng-container>
    </g>

    <!-- Arrow marker, grid pattern, and drop shadow filter definitions -->
    <defs>
      <marker id="arrowhead-v2" markerWidth="6" markerHeight="3" refX="6" refY="1.5" orient="auto">
        <polygon points="0 0, 6 1.5, 0 3" fill="none" stroke="#666" stroke-width="1" />
      </marker>

      <marker id="arrow-start" markerWidth="12" markerHeight="6" refX="0" refY="3" orient="auto">
        <polygon points="12 0, 0 3, 12 6" fill="none" stroke="#666" stroke-width="1" />
      </marker>
      <marker id="arrow-end" markerWidth="12" markerHeight="6" refX="12" refY="3" orient="auto">
        <polygon points="0 0, 12 3, 0 6" fill="none" stroke="#666" stroke-width="1" />
      </marker>

      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="10" cy="10" r="1" fill="#cccccc">
        </circle>
      </pattern>

      <pattern id="brickPattern" width="40" height="20" patternUnits="userSpaceOnUse">
        <rect width="40" height="20" fill="#cc0000" opacity="0.1" />
        <path d="M 0 0 L 40 0 L 40 20 L 0 20 Z M 0 10 L 40 10 M 20 0 L 20 10 M 0 10 L 0 20 M 40 10 L 40 20 M 10 10 L 10 20 M 30 10 L 30 20" fill="none" stroke="#660000" stroke-width="1" opacity="0.4" />
      </pattern>

      <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.3" />
      </filter>

      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="coloredBlur" />
        <feMerge>
          <feMergeNode in="coloredBlur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Premium Note Gradients -->
      <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#fff176;stop-opacity:1" />
      </linearGradient>

      <linearGradient id="curlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#fbc02d;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#fff176;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#fff9c4;stop-opacity:1" />
      </linearGradient>

      <linearGradient id="pushpinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#ff5252;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
      </linearGradient>
    </defs>
  </svg>

  <!-- Zoom controls strip -->
  <div class="zoom-strip">
    <button class="zoom-btn" (click)="zoomIn()" title="Zoom In">+</button>
    <button class="zoom-btn zoom-reset" (click)="resetZoom()" [title]="(zoomLevel * 100 | number:'1.0-0') + '%'">●</button>
    <button class="zoom-btn" (click)="zoomOut()" title="Zoom Out">−</button>
  </div>
</div>
