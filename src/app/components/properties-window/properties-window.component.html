<div class="properties-window"
     [class.visible]="isVisible"
     [style.top.px]="y"
     [style.left.px]="x"
     [style.width.px]="windowWidth"
     [style.height.px]="windowHeight">

  <div class="properties-header">
    <h3>Properties</h3>
  </div>

  <div class="properties-content">
    <div class="property-block" *ngIf="type && !isNoteShape">
      <label>Name</label>
      <input type="text"
             [value]="getName()"
             (input)="updateName($event)"
             placeholder="Element name" />
    </div>

    <ng-container *ngIf="type === 'node' || type === 'boundingBox' || type === 'svg' || type === 'connector'">
      <!-- Main Content Edit (For Note and Text shapes only) -->
      <div class="property-block" *ngIf="isNoteShape || isTextShape">
        <label>Content</label>
        <textarea rows="4"
                  [value]="getLabel()"
                  (input)="updateLabel($event)"
                  placeholder="Type your content here..."></textarea>
      </div>

      <!-- Name/Text editing for other shapes is handled via the toolbar -->
      <!-- Shared Node/Box Properties -->
      <div class="property-row" *ngIf="type === 'node' || type === 'boundingBox' || type === 'svg' || type === 'connector'">
        <button class="line-style-btn" (click)="toggleDotted()" *ngIf="type !== 'boundingBox' && type !== 'svg'">
          <span class="line-icon" [class.dotted]="getIsDotted()"></span>
          <span class="line-text">{{ getIsDotted() ? 'Dotted' : 'Solid' }}</span>
        </button>

        <div class="select-container" *ngIf="type === 'node' || type === 'connector' || type === 'svg'">
          <select class="custom-select small" [value]="getStrokeWidth()" (change)="updateStrokeWidth($event)">
            <option value="0.5">0.5px</option>
            <option value="1">1px</option>
            <option value="2">2px</option>
            <option value="3">3px</option>
            <option value="4">4px</option>
          </select>
        </div>
      </div>

      <!-- Connector Arrows (Connector only) -->
      <div class="property-block" *ngIf="type === 'connector'">
        <label>Connector Arrows</label>
        <div style="display: flex; gap: 12px; width: 100%;">
          <select class="custom-select" [value]="getStartArrowType()" (change)="updateStartArrowType($event)" style="flex: 1;">
            <option value="none">None</option>
            <option value="arrow">Outline Arrow</option>
            <option value="solid">Solid Arrow</option>
          </select>
          <select class="custom-select" [value]="getEndArrowType()" (change)="updateEndArrowType($event)" style="flex: 1;">
            <option value="none">None</option>
            <option value="arrow">Outline Arrow</option>
            <option value="solid">Solid Arrow</option>
          </select>
        </div>
      </div>

      <!-- Rounding toggle (Bounding Box and Rectangle) -->
      <div class="property-block checkbox-block" *ngIf="type === 'boundingBox' || (type === 'node' && $any(selectedElement)?.shape === 'rectangle')">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" [checked]="getIsRounded()" (change)="toggleRounded()">
          <span>Rounded Corners</span>
        </label>
      </div>

      <!-- Padlock Locked toggle -->
      <button class="line-style-btn" (click)="toggleLocked()" *ngIf="isPadlockShape">
        <svg *ngIf="getIsLocked()" class="line-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 16px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        <svg *ngIf="!getIsLocked()" class="line-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 16px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
        <span class="line-text">{{ getIsLocked() ? 'Locked' : 'Unlocked' }}</span>
      </button>

      <!-- Layered toggle (Supported Nodes only) -->
      <button class="line-style-btn" (click)="toggleLayered()" *ngIf="getSupportsLayered()">
        <svg *ngIf="!getIsLayered()" class="line-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 16px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
        <svg *ngIf="getIsLayered()" class="line-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 16px;"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4" fill="none"></path><path d="M14 2v6h6" fill="none"></path><path d="M2 15h10" fill="none"></path><path d="M8 18h4" fill="none"></path></svg>
        <span class="line-text">{{ getIsLayered() ? 'Layered' : 'Normal' }}</span>
      </button>

      <!-- Brick Wall toggle (Wall only) -->
      <button class="line-style-btn" (click)="toggleBrickWall()" *ngIf="isWallShape">
        <svg class="line-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 16px;">
          <path d="M2 20h20M4 20V4h16v16M4 12h16M12 4v8M8 12v8M16 12v8" />
        </svg>
        <span class="line-text">{{ getIsBrickWall() ? 'Brick Wall' : 'Plain Wall' }}</span>
      </button>

      <!-- Stereotypes (Rectangle and Rounded Rectangle only) -->
      <div class="property-block" *ngIf="isRectangleShape || isRoundedRectangleShape">
        <label>Stereotypes (comma separated)</label>
        <textarea rows="2" [value]="getStereotypes().join(', ')" (input)="updateStereotypes($event)" placeholder="e.g. Metaclass, Abstract"></textarea>
      </div>

      <div class="color-grid" *ngIf="type === 'node' || type === 'boundingBox' || type === 'svg'">
        <!-- Fill Button (Node & Box) -->
        <label class="color-btn fill-btn" *ngIf="type !== 'svg'" [style.background-color]="getFillColor() || '#ffffff'">
          <input type="color" [value]="getFillColor()" (input)="updateFillColor($event)">
          <div class="color-content">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"></path>
               <path d="m5 2 5 5"></path>
               <path d="M2 13h15"></path>
               <path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"></path>
            </svg>
            <span>Fill</span>
          </div>
        </label>

        <!-- Stroke Button -->
        <label class="color-btn stroke-btn" [style.background-color]="getStrokeColor() || '#000000'">
          <input type="color" [value]="getStrokeColor()" (input)="updateStrokeColor($event)">
          <div class="color-content">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
            <span>Stroke</span>
          </div>
        </label>
      </div>

      <div class="color-grid single" *ngIf="type === 'connector'">
        <!-- Stroke Button (Connector Only) -->
        <label class="color-btn stroke-btn" [style.background-color]="getStrokeColor() || '#000000'">
          <input type="color" [value]="getStrokeColor()" (input)="updateStrokeColor($event)">
          <div class="color-content">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
            <span>Stroke</span>
          </div>
        </label>
      </div>

      <div class="property-block" *ngIf="type !== 'svg'">
        <label>Font Styling</label>
        <div class="font-controls">
          <select class="custom-select" [value]="getFontFamily()" (change)="updateFontFamily($event)">
            <option value="'Roboto', sans-serif">Roboto</option>
            <option value="Arial">Arial</option>
            <option value="'Courier New', Courier, monospace">Courier New</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="'Times New Roman', Times, serif">Times New Roman</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="Purisa, Chalkboard">Handwritten</option>
          </select>

          <div class="font-sub-controls">
            <input type="number" class="custom-select size-input" [value]="getFontSize()" (input)="updateFontSize($event)" min="8" max="72">
            <button class="style-toggle" [class.active]="getFontWeight() === 'bold'" (click)="toggleFontWeight()" title="Bold">B</button>
            <button class="style-toggle" [class.active]="getFontStyle() === 'italic'" (click)="toggleFontStyle()" title="Italic">I</button>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Shared Notes Section -->
    <div class="property-block accordion-block" *ngIf="type">
      <div class="accordion-header" (click)="toggleNotes()">
        <label>Notes</label>
        <svg class="chevron" [class.expanded]="notesExpanded" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="accordion-content" *ngIf="notesExpanded">
        <textarea rows="3"
                  [value]="getNotes()"
                  (input)="updateNotes($event)"
                  placeholder="Refinement needed..."></textarea>
      </div>
    </div>

    <!-- Tags Section -->
    <div class="property-block accordion-block" *ngIf="type">
      <div class="accordion-header" (click)="toggleTags()">
        <label>Tags</label>
        <svg class="chevron" [class.expanded]="tagsExpanded" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="accordion-content" *ngIf="tagsExpanded">
        <div class="tags-container">
          <div class="tag-row" *ngFor="let tag of localTags; let i = index; trackBy: trackByIndex">
            <input type="text"
                   class="tag-input"
                   [value]="tag.key"
                   (input)="updateTag(i, 'key', $event)"
                   (blur)="onTagBlur(i, $event)"
                   placeholder="Key"
                   maxlength="64" />
            <input type="text"
                   class="tag-input"
                   [value]="tag.value"
                   (input)="updateTag(i, 'value', $event)"
                   (blur)="onTagBlur(i, $event)"
                   placeholder="Value"
                   maxlength="64" />
          </div>
        </div>
      </div>
    </div>

    <!-- CRC Card Properties -->
    <ng-container *ngIf="isCrcCardShape">
      <div class="property-block">
        <label>Class Name</label>
        <input type="text" [value]="getCrcCardData().className" (input)="updateCrcCardClassName($event)" placeholder="Class name...">
      </div>

      <div class="property-block">
        <label>Super Classes (comma separated)</label>
        <textarea rows="2" [value]="getCrcCardData().superClasses.join(', ')" (input)="updateCrcCardSuperClasses($event)" placeholder="SuperClass1, SuperClass2..."></textarea>
      </div>

      <div class="property-block">
        <label>Sub Classes (comma separated)</label>
        <textarea rows="2" [value]="getCrcCardData().subClasses.join(', ')" (input)="updateCrcCardSubClasses($event)" placeholder="SubClass1, SubClass2..."></textarea>
      </div>

      <div class="property-block">
        <label>Description</label>
        <textarea rows="3" [value]="getCrcCardData().description" (input)="updateCrcCardDescription($event)" placeholder="Description..."></textarea>
      </div>

      <div class="property-block">
        <label>Attributes</label>
        <div class="crc-table-editor">
          <div class="crc-table-row" *ngFor="let attr of getCrcCardData().attributes; let i = index">
            <input type="text" [value]="attr.name" (input)="updateCrcCardAttribute(i, 'name', $event)" (blur)="onCrcAttributeBlur(i)" placeholder="Name">
            <input type="text" [value]="attr.description" (input)="updateCrcCardAttribute(i, 'description', $event)" (blur)="onCrcAttributeBlur(i)" placeholder="Description">
          </div>
        </div>
      </div>

      <div class="property-block">
        <label>Responsibilities</label>
        <div class="crc-table-editor">
          <div class="crc-table-row" *ngFor="let resp of getCrcCardData().responsibilities; let i = index">
            <input type="text" [value]="resp.name" (input)="updateCrcCardResponsibility(i, 'name', $event)" (blur)="onCrcResponsibilityBlur(i)" placeholder="Name">
            <input type="text" [value]="resp.collaborator" (input)="updateCrcCardResponsibility(i, 'collaborator', $event)" (blur)="onCrcResponsibilityBlur(i)" placeholder="Collaborator">
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Threat Table Properties -->
    <ng-container *ngIf="isThreatTableShape">
      <div class="property-block">
        <label>Table Title</label>
        <input type="text" [value]="getThreatTableData().title" (input)="updateThreatTableTitle($event)" placeholder="Threat Table Title...">
      </div>

      <div class="property-row">
        <div class="property-block" style="flex: 1; margin-right: 8px;">
          <label>Col 1 Header</label>
          <input type="text" [value]="getThreatTableData().col1Header" (input)="updateThreatTableCol1Header($event)" placeholder="ID...">
        </div>
        <div class="property-block" style="flex: 2;">
          <label>Col 2 Header</label>
          <input type="text" [value]="getThreatTableData().col2Header" (input)="updateThreatTableCol2Header($event)" placeholder="Description...">
        </div>
      </div>

      <div class="property-block">
        <label>Table Rows</label>
        <div class="crc-table-editor">
          <div class="crc-table-row" *ngFor="let row of getThreatTableData().rows; let i = index">
            <input type="text" [value]="row.col1" (input)="updateThreatTableRow(i, 'col1', $event)" (blur)="onThreatTableRowBlur(i)" [placeholder]="getThreatTableData().col1Header">
            <input type="text" [value]="row.col2" (input)="updateThreatTableRow(i, 'col2', $event)" (blur)="onThreatTableRowBlur(i)" [placeholder]="getThreatTableData().col2Header">
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!type">
      Select an element to edit properties.
    </div>
  </div>

  <div class="resize-handle" (mousedown)="onResizeStart($event)">
    <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="21 3 3 21"></polyline>
      <polyline points="21 12 12 21"></polyline>
    </svg>
  </div>
</div>
